<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0d0f14">
<title>Admin Login — CricScore Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f14;--c:#1c2030;--bdr:rgba(255,255,255,.09);--g:#39ff7a;--r:#ff3b3b;--t:#f0f2f8;--t2:#8a90a8}
body{background:var(--bg);color:var(--t);font-family:-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{width:100%;max-width:380px;background:rgba(255,255,255,.05);border:1px solid var(--bdr);border-radius:20px;padding:32px 24px}
.logo{text-align:center;margin-bottom:28px}
.logo h1{font-size:22px;font-weight:800;color:var(--g)}
.logo p{font-size:12px;color:var(--t2);margin-top:4px}
label{font-size:11px;color:var(--t2);display:block;margin:14px 0 4px}
input{width:100%;background:var(--c);border:1px solid var(--bdr);color:var(--t);border-radius:10px;padding:11px 14px;font-size:14px;outline:none;letter-spacing:2px}
input:focus{border-color:var(--g)}
.btn{display:block;width:100%;padding:13px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;margin-top:14px}
.btn-g{background:var(--g);color:#000}
.btn-h{background:transparent;border:1px solid var(--bdr);color:var(--t2);margin-top:10px}
.btn:active{opacity:.75}
.err{display:none;background:rgba(255,59,59,.1);border:1px solid rgba(255,59,59,.25);border-radius:10px;padding:10px 14px;font-size:12px;font-weight:700;color:var(--r);text-align:center;margin-top:12px}
.spin{display:none;text-align:center;margin-top:12px;font-size:12px;color:var(--t2)}
.lock{font-size:40px;margin-bottom:10px}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="lock">🔐</div>
    <h1>Admin Access</h1>
    <p>CricScore Pro Dashboard</p>
  </div>
  <label>Enter admin code</label>
  <input id="code" type="password" placeholder="••••••••" autocomplete="off" autofocus>
  <div class="err" id="err"></div>
  <div class="spin" id="spin">Verifying…</div>
  <button class="btn btn-g" onclick="verify()">Enter Dashboard</button>
  <button class="btn btn-h" onclick="goHome()">← Back to App</button>
</div>

<script>
var _FB_API_KEY    = 'AIzaSyCLCEne8x6emwB5RSeDWOHlFENxbIYXFZo';
var _FB_PROJECT_ID = 'cricscore-pro-61bce';
var BASE = 'https://firestore.googleapis.com/v1/projects/' + _FB_PROJECT_ID + '/databases/(default)/documents';

// If they came from the app with a valid session, they can proceed
// (they already verified once). This login page verifies again independently.

function goHome() { window.location.href = 'index.html'; }

document.getElementById('code').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') verify();
});

function verify() {
  var entered = document.getElementById('code').value.trim();
  var errEl = document.getElementById('err');
  var spin  = document.getElementById('spin');
  errEl.style.display = 'none';
  if (!entered) { showErr('Enter the admin code'); return; }
  spin.style.display = 'block';
  fetch(BASE + '/config/admin?key=' + _FB_API_KEY)
    .then(function(r) { return r.json(); })
    .then(function(doc) {
      spin.style.display = 'none';
      var stored = '';
      if (doc && doc.fields && doc.fields.code) {
        stored = doc.fields.code.stringValue || '';
      }
      if (!stored) { showErr('Admin not configured — add config/admin {code:"..."} in Firestore'); return; }
      if (entered === stored) {
        sessionStorage.setItem('cs_admin_auth', '1');
        sessionStorage.setItem('cs_admin_ts', Date.now().toString());
        window.location.href = 'admin.html';
      } else {
        showErr('Access Denied — incorrect code');
        document.getElementById('code').value = '';
      }
    })
    .catch(function() {
      spin.style.display = 'none';
      showErr('Firebase error — check your config');
    });
}

function showErr(msg) {
  var el = document.getElementById('err');
  el.textContent = msg; el.style.display = 'block';
}

// Session expired check (session valid for 2 hours)
var ts = parseInt(sessionStorage.getItem('cs_admin_ts') || '0');
if (sessionStorage.getItem('cs_admin_auth') === '1' && Date.now() - ts < 7200000) {
  window.location.href = 'admin.html';
}
</script>
</body>
</html>
